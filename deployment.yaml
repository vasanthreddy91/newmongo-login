apiVersion: apps/v1
kind: Deployment
metadata:
  name: newmongo-login-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: newmongo-login
  template:
    metadata:
      labels:
        app: newmongo-login
    spec:
      containers:
        - name: newmongo-login
          image: newmongo-login:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017/loginDB
